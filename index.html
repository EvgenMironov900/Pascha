<body>
<h1>📆 Православный календарь</h1>
<div class="sub">Переходящие праздники (от Пасхи)</div>

<div class="input-panel">
    <label for="year">Год</label>
    <input type="number" id="year" value="2026" step="1">
    <button onclick="updateAll()">Показать</button>
</div>

<div class="card" id="datesContainer">
    <!-- сюда js вставит список дат -->
    <div style="padding: 1rem; text-align: center;">Загрузка...</div>
</div>
<div class="footer">
    По григорианскому календарю. Расчёт на основе формул К. Гаусса (православная Пасха).
</div>

<script>
    // ---- ТОЧНЫЙ РАСЧЁТ ПАСХИ (ваша формула, григорианский стиль) ----
    function getPascha(year) {
        let a = year % 4;
        let b = year % 7;
        let c = year % 19;
        let d = (19 * c + 15) % 30;
        let e = (2 * a + 4 * b + 6 * d + 6) % 7;
        let f = d + e + 4;
        let day = (f <= 30) ? f : f - 30;
        let month = (f <= 30) ? 4 : 5; // 4 = апрель, 5 = май
        return new Date(year, month - 1, day);
    }

    // ---- ВСПОМОГАТЕЛЬНАЯ: прибавить дни к дате ----
    function addDays(date, days) {
        let result = new Date(date);
        result.setDate(result.getDate() + days);
        return result;
    }

    // ---- ФОРМАТИРОВАНИЕ "день месяц" (например, "12 апреля") ----
    function formatDate(date) {
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        return `${date.getDate()} ${months[date.getMonth()]}`;
    }

    // ---- ГЛАВНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ ----
    function updateAll() {
        let yearInput = document.getElementById('year');
        let year = parseInt(yearInput.value);
        if (isNaN(year) || year < 1) {
            year = new Date().getFullYear();
            yearInput.value = year;
        }

        const paschaDate = getPascha(year);

        // Все события относительно Пасхи (смещение в днях)
        const events = [
            { name: "Масленица", offsetStart: -56, offsetEnd: -50, type: "range" },
            { name: "Прощёное воскресенье", offset: -49, type: "single" },
            { name: "Великий пост", offsetStart: -48, offsetEnd: -1, type: "range" },
            { name: "Вербное воскресенье", offset: -7, type: "single" },
            { name: "🌷 ПАСХА", offset: 0, type: "pascha" },
            { name: "Вознесение Господне", offset: 40, type: "single" },
            { name: "ТРОИЦА (Пятидесятница)", offset: 50, type: "single" },
            { name: "День Святого Духа", offset: 51, type: "single" }
        ];

        let html = '';

        for (let ev of events) {
            if (ev.type === "pascha") {
                html += `<div class="event pascha">
                            <span class="event-name">${ev.name}</span>
                            <span class="event-date">${formatDate(paschaDate)}</span>
                         </div>`;
            }
            else if (ev.type === "single") {
                let date = addDays(paschaDate, ev.offset);
                html += `<div class="event">
                            <span class="event-name">${ev.name}</span>
                            <span class="event-date">${formatDate(date)}</span>
                         </div>`;
            }
            else if (ev.type === "range") {
                let start = addDays(paschaDate, ev.offsetStart);
                let end = addDays(paschaDate, ev.offsetEnd);
                // Чтобы диапазон выглядел компактно: "15–21 февраля"
                let startStr = formatDate(start);
                let endStr = formatDate(end);
                // убираем повтор месяца, если месяц не изменился
                let startParts = startStr.split(' ');
                let endParts = endStr.split(' ');
                let rangeStr = '';
                if (startParts[1] === endParts[1]) {
                    rangeStr = `${startParts[0]}–${endParts[0]} ${startParts[1]}`;
                } else {
                    rangeStr = `${startStr} – ${endStr}`;
                }
                html += `<div class="event">
                            <span class="event-name">${ev.name}</span>
                            <span class="event-date">${rangeStr}</span>
                         </div>`;
            }
        }

        // Дополнительно можно добавить Петров пост (необязательно, но многие спрашивают)
        // Петров пост начинается через 57 дней после Пасхи (понедельник), длится до 12 июля.
        const peterStart = addDays(paschaDate, 57);
        const peterEnd = new Date(year, 6, 12); // 12 июля
        if (peterStart <= peterEnd) {
            let startStr = formatDate(peterStart);
            let endStr = formatDate(peterEnd);
            html += `<div class="event">
                        <span class="event-name">Петров пост</span>
                        <span class="event-date">${startStr} – ${endStr}</span>
                     </div>`;
        }

        document.getElementById('datesContainer').innerHTML = html;
    }

    // Запуск при загрузке и при изменении года (по кнопке)
    window.onload = () => {
        updateAll();
        document.getElementById('year').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') updateAll();
        });
    };
</script>
